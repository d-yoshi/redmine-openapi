name: CI

on:
  push:
    paths:
      - ".github/workflows/ci.yaml"
      - "src/**"
      - "redocly/**"
      - "test/**"
    tags-ignore:
      - "**"
    branches:
      - "**"
  pull_request:
    paths:
      - ".github/workflows/ci.yaml"
      - "src/**"
      - "redocly/**"
      - "test/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: bundle
        run: npx @redocly/cli@latest bundle --config redocly/redocly.yaml dist -o openapi.yaml
      - name: lint
        run: npx @redocly/cli@latest lint --config redocly/redocly.yaml openapi.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: openapi.yaml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "test/package-lock.json"
      - run: npm ci
        working-directory: test
      - name: simple/detail schema sync
        run: node check-simple-detail-sync.mjs
        working-directory: test
      - run: ./run-test.sh
        working-directory: test
      - name: type check
        run: npx tsc --noEmit
        working-directory: test

  # Informational: show changes against the latest release tag (never fails the build)
  spec-diff:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: oasdiff changelog against latest release tag
        run: |
          # Nearest release tag among the ancestors of HEAD (branch-aware)
          PREV_TAG=$(git describe --tags --abbrev=0 --match '*+redmine*' HEAD 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous release tag found; skipping diff." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git show "$PREV_TAG:openapi.yaml" > /tmp/previous.yaml
          npx @redocly/cli@latest bundle --config redocly/redocly.yaml dist -o openapi.yaml
          {
            echo "## oasdiff changelog vs \`$PREV_TAG\`"
            echo '```'
            docker run --rm -v /tmp:/tmp -v "$PWD":/repo -w /repo tufin/oasdiff changelog /tmp/previous.yaml /repo/openapi.yaml || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  commit-bundle:
    if: github.event_name == 'push'
    needs:
      - bundle
      - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: openapi
      - name: commit & push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add openapi.yaml
          git diff-index --quiet HEAD openapi.yaml || (git commit -m "Update bundled file" && git push)
