name: Release

# Creates a GitHub Release when a release tag (e.g. 2.0.0+redmine.6.1.3) is
# pushed, then publishes the docs site so it always matches the latest
# release. Tags not on main (maintenance lines) skip the docs jobs.
on:
  push:
    tags:
      - "*redmine*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Verify tag format
        run: |
          if ! echo "$GITHUB_REF_NAME" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\+redmine\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match the release format '<major>.<minor>.<patch>+redmine.<x.y.z>'."
            exit 1
          fi

      - name: Verify bundle freshness
        run: |
          npx @redocly/cli@latest bundle --config redocly/redocly.yaml dist -o /tmp/fresh.yaml
          if ! diff -u openapi.yaml /tmp/fresh.yaml; then
            echo "::error::Committed openapi.yaml does not match a fresh bundle of src/. Tag a commit where the bundle is up to date."
            exit 1
          fi

      - name: Verify tag matches info.version
        run: |
          VERSION=$(grep -m1 -E '^  version:' openapi.yaml | awk '{print $2}')
          if [ "$VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag ($GITHUB_REF_NAME) does not match info.version ($VERSION) in openapi.yaml."
            exit 1
          fi

      - name: Find previous release tag
        id: prev
        run: |
          # Ancestors only, so a maintenance-branch release is compared against
          # its own line, never against a newer main-line release
          PREV_TAG=$(git describe --tags --abbrev=0 --match '*+redmine*' "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous release tag: ${PREV_TAG:-<none>}"

      - name: Enforce version bump floor
        if: steps.prev.outputs.tag != ''
        env:
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          git show "$PREV_TAG:openapi.yaml" > /tmp/previous.yaml
          set +e
          docker run --rm -v /tmp:/tmp -v "$PWD":/repo -w /repo tufin/oasdiff breaking --fail-on ERR /tmp/previous.yaml /repo/openapi.yaml
          RC=$?
          set -e
          if [ "$RC" -eq 0 ]; then
            echo "No breaking changes vs $PREV_TAG."
          elif [ "$RC" -eq 1 ]; then
            # oasdiff exits 1 when breaking changes are found
            NEW_MAJOR=${GITHUB_REF_NAME%%.*}
            OLD_MAJOR=${PREV_TAG%%.*}
            if [ "$NEW_MAJOR" -le "$OLD_MAJOR" ]; then
              echo "::error::Breaking changes detected vs $PREV_TAG but MAJOR was not bumped ($OLD_MAJOR -> $NEW_MAJOR)."
              exit 1
            fi
            echo "Breaking changes present and MAJOR bumped ($OLD_MAJOR -> $NEW_MAJOR); OK."
          else
            echo "::error::oasdiff failed with exit code $RC (tool error, not a breaking-change verdict)."
            exit 1
          fi

      - name: Build release notes
        env:
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          {
            grep -m1 -oE 'Tested against: Redmine [0-9.]+' README.md
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo
              echo "Generated by [oasdiff](https://github.com/oasdiff/oasdiff): \`error\` = breaking for spec consumers (regenerated clients or validators may break), \`warning\`/\`info\` = non-breaking. Breaking entries are often corrections of the spec, not behavior changes in Redmine itself."
              echo
              echo '```'
              docker run --rm -v /tmp:/tmp -v "$PWD":/repo -w /repo tufin/oasdiff changelog /tmp/previous.yaml /repo/openapi.yaml || true
              echo '```'
            fi
          } > /tmp/notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" openapi.yaml \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md

  docs-build:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    outputs:
      deploy: ${{ steps.guard.outputs.deploy }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Skip maintenance-line releases
        id: guard
        run: |
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag is not on main; skipping docs deployment."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v7
        if: steps.guard.outputs.deploy == 'true'
        with:
          node-version: 24
      - uses: actions/configure-pages@v6
        if: steps.guard.outputs.deploy == 'true'
        id: setup
      - name: build docs
        if: steps.guard.outputs.deploy == 'true'
        run: |
          mkdir dist
          cp -r redocly/assets/* dist
          npx @redocly/cli@latest build-docs --config redocly/redocly.yaml dist -t redocly/build-docs-template.hbs --templateOptions.basePath "${{ steps.setup.outputs.base_path }}" -o dist/index.html
          cat > dist/sitemap.xml <<EOT
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>${{ steps.setup.outputs.base_url }}/</loc>
              <lastmod>$(date +"%Y-%m-%dT%H:%M:%S%:z")</lastmod>
            </url>
          </urlset>
          EOT
      - uses: actions/upload-pages-artifact@v5
        if: steps.guard.outputs.deploy == 'true'
        with:
          path: "dist"

  docs-deploy:
    runs-on: ubuntu-latest
    needs: docs-build
    if: needs.docs-build.outputs.deploy == 'true'
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
